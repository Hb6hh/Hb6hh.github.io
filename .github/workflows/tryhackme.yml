name: Update TryHackMe stats

on:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: npm i --no-save playwright

      - name: Install Playwright browser + OS dependencies
        run: npx playwright install --with-deps chromium

      - name: Update stats JSON
        run: node scripts/update-tryhackme.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/tryhackme.json
          git diff --cached --quiet || git commit -m "chore: update TryHackMe stats"
          git push
